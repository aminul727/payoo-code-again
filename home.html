<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Login</title>
    <!-- logo link added below -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <!-- icon link added below -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font link added below -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- tailwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">
    <header class="border-gray-300 border-b-2 bg-base-200 sticky top-0">
        <section class="w-11/12 mx-auto flex justify-between items-center">
            <div class="left py-3 flex gap-2">
                <div class="w-[60px]"><img src="assets/logo.png" alt=""></div>
                <div>
                    <h2 class="text-2xl font-bold">$ <span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="/index.html" class="btn btn-soft"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        </section>
    </header>
    <section class="w-11/12 mx-auto py-10">
        <h2 class="text-3xl font-bold">Welcome to Pay <span class="text-primary">oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
        <div class="button pt-3 grid grid-cols-3 gap-3">
            <button onclick="showOnly('add-money')" class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="assets/opt-1.png" alt="">
                <p>Add money</p>
            </button>
            <button onclick="showOnly('cashout')" class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button onclick="showOnly('money-t')" class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="assets/opt-3.png" alt="">
                <p>Transfer Money</p>
            </button>
            <button onclick="showOnly('bonus')" class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button onclick="showOnly('pay-b')" class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button onclick="showOnly('history')" class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>

        </div>
    </section>
    <section id="cashout" class="w-11/12 mx-auto pt-4 hidden">
        <h2 class="text-neutral font-bold mb-2">Cash Out</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Agent Number</label>
                    <input id="cashout-number" maxlength="11" minlength="11" type="digit"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter Agent Number" />
                    <br>
                    <label class="label text-neutral font-bold">Amount</label>
                    <input id="cashout-amount" type="number" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter Amount" />
                    <br>
                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="cashout-pin" maxlength="4" minlength="4" type="password"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter Your 4 Digit Pin" />
                    <button id="cashout-btn" class="btn btn-primary rounded-full mt-4 w-full">Cash Out</button>
                </fieldset>
            </div>
        </div>
    </section>
    <section id="add-money" class="w-11/12 mx-auto pt-4 hidden">
        <h2 class="text-neutral font-bold mb-2">Add Money</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Select Bank</label>
                    <select id="add-money-bank" class="select w-full rounded-full bg-base-200">
                        <option disabled selected>select a bank</option>
                        <option value="DBBL">DBBL</option>
                        <option value="City Bank">City Bank</option>
                        <option value="Trust Bank">Trust Bank</option>
                    </select>
                    <br>
                    <label class="label text-neutral font-bold">Bank Account Number</label>
                    <input id="add-money-number" type="digit" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter Bank Account Number" />
                    <br>
                    <label class="label text-neutral font-bold">Amount To Add</label>
                    <input id="add-money-amount" type="number" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter Your Amount" />
                    <br>
                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="add-money-pin" maxlength="4" minlength="4" type="password"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter Your 4 Digit Pin" />
                    <button id="add-money-btn" class="btn btn-primary rounded-full mt-4 w-full">Add Money</button>
                </fieldset>
            </div>
        </div>
    </section>
    <section id="money-t" class="w-11/12 mx-auto pt-4 hidden">
        <h2 class="text-neutral font-bold mb-2">Transfer Money</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">User Account Number</label>
                    <input id="money-t-number" maxlength="11" minlength="11" type="digit"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter user Account Number" />
                    <br>
                    <label class="label text-neutral font-bold">Amount</label>
                    <input id="money-t-amount" type="number" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter Amount to transfer" />
                    <br>
                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="money-t-pin" maxlength="4" minlength="4" type="password"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter Your 4 Digit Pin" />
                    <button id="money-t-btn" class="btn btn-primary rounded-full mt-4 w-full">Send Now</button>
                </fieldset>
            </div>
        </div>
    </section>
    <section id="bonus" class="w-11/12 mx-auto pt-4 hidden">
        <h2 class="text-neutral font-bold mb-2">Get Bonus</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Enter Bonus Coupon</label>
                    <input id="bonus-cp" type="digit" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter Your Coupon" />
                    <button id="bonus-btn" class="btn btn-primary rounded-full mt-4 w-full">Get Bonus</button>
                </fieldset>
            </div>
        </div>
    </section>
    <section id="pay-b" class="w-11/12 mx-auto pt-4 hidden">
        <h2 class="text-neutral font-bold mb-2">Pay Bills</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Select To Pay</label>
                    <select id="pay-b-bank" class="select w-full rounded-full bg-base-200">
                        <option disabled selected>select back</option>
                        <option value="dbbl">DBBL</option>
                        <option value="city bank">City Bank</option>
                        <option value="trust bank">Trust Bank</option>
                    </select>
                    <br>
                    <label class="label text-neutral font-bold">Biller Account Number</label>
                    <input id="pay-b-number" type="digit" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter Biller Account Number" />
                    <br>
                    <label class="label text-neutral font-bold">Amount To Add</label>
                    <input id="pay-b-amount" type="number" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter Your Amount" />
                    <br>
                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input id="pay-b-pin" maxlength="4" minlength="4" type="password"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter Your 4 Digit Pin" />
                    <button id="pay-b-btn" class="btn btn-primary rounded-full mt-4 w-full">Pay Now</button>
                </fieldset>
            </div>
        </div>
    </section>
    <section id="history" class="w-11/12 mx-auto pt-4">
        <h2 class="text-neutral font-bold mb-2">Transactions</h2>
        <div class="space-y-5 bg-base-300" id="history-container">
            
        </div>
    </section>

    <script src="script/machine.js"></script>
    <script src="script/cashout.js"></script>
    <script src="script/add-money.js"></script>
    <script src="script/transfer.js"></script>
    <script src="script/bill-pay.js"></script>
    <script src="script/bonus.js"></script>

</body>

</html>
