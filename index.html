<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Login</title>
    <!-- logo link added below -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <!-- icon link added below -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font link added below -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- tailwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">
    <div class="logo w-[210px] mx-auto pt-36">
        <img src="assets/Logo-full.png" alt="">
    </div>
    <div class="form pt-10">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow rounded-2xl mx-auto">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Mobile Number</label>
                    <input id="login-number" maxlength="11" minlength="11" type="digit" class="input rounded-full bg-base-200" placeholder="Enter Your Mobile Number" />
                    <br>
                    <label class="label text-neutral font-bold">4 Digit Pin</label>
                    <input id="login-pin" type="password" class="input rounded-full bg-base-200" placeholder="Enter Your 4 Digit Pin" />
                    <button id="login-btn" class="btn btn-primary rounded-full mt-4">Login</button>
                </fieldset>
            </div>
        </div>
    </div>

    <script src="script/login.js"></script>
</body>

</html>
